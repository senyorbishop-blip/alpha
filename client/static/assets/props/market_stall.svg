<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="ms-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0d0900" flood-opacity="0.55"/>
    </filter>
    <!-- Awning stripe pattern -->
    <pattern id="ms-stripe" patternUnits="userSpaceOnUse" width="14" height="40" patternTransform="skewX(-5)">
      <rect width="7" height="40" fill="#c0392b"/>
      <rect x="7" width="7" height="40" fill="#e8e0c8"/>
    </pattern>
  </defs>
  <g filter="url(#ms-shadow)">
    <!-- Wooden support posts -->
    <rect x="13" y="50" width="8" height="68" fill="#6b3f14" stroke="#2a1f0e" stroke-width="1.5" rx="2"/>
    <rect x="107" y="50" width="8" height="68" fill="#6b3f14" stroke="#2a1f0e" stroke-width="1.5" rx="2"/>
    <!-- Counter table -->
    <rect x="10" y="72" width="108" height="36" fill="#7a4820" stroke="#2a1f0e" stroke-width="2" rx="3"/>
    <rect x="12" y="74" width="104" height="22" fill="#a0632a" stroke="#2a1f0e" stroke-width="1.5" rx="2"/>
    <!-- Goods on counter: bread loaf -->
    <ellipse cx="36" cy="83" rx="11" ry="7" fill="#d4973a" stroke="#2a1f0e" stroke-width="1.5"/>
    <path d="M28 81 Q36 73 44 81" fill="none" stroke="#2a1f0e" stroke-width="1" opacity="0.5"/>
    <!-- Goods: potion bottle -->
    <rect x="53" y="77" width="9" height="13" fill="#9b2335" stroke="#2a1f0e" stroke-width="1.5" rx="3"/>
    <rect x="55" y="74" width="5" height="5" fill="#7a1a28" stroke="#2a1f0e" stroke-width="1" rx="1"/>
    <line x1="57.5" y1="73" x2="57.5" y2="75" stroke="#2a1f0e" stroke-width="1.5"/>
    <!-- Goods: coin pile -->
    <ellipse cx="80" cy="87" rx="9" ry="4" fill="#c8972a" stroke="#2a1f0e" stroke-width="1.5"/>
    <ellipse cx="80" cy="84" rx="9" ry="4" fill="#e8b830" stroke="#2a1f0e" stroke-width="1.5"/>
    <!-- Goods: sack -->
    <ellipse cx="101" cy="84" rx="8" ry="9" fill="#c8a86a" stroke="#2a1f0e" stroke-width="1.5"/>
    <path d="M97 76 Q101 72 105 76" fill="none" stroke="#2a1f0e" stroke-width="1.5"/>
    <!-- Awning frame bar -->
    <rect x="10" y="46" width="108" height="7" fill="#5a3614" stroke="#2a1f0e" stroke-width="2" rx="2"/>
    <!-- Striped awning -->
    <rect x="10" y="14" width="108" height="36" fill="url(#ms-stripe)" stroke="#2a1f0e" stroke-width="2" rx="3"/>
    <!-- Awning scalloped bottom edge -->
    <path d="M10 46 Q20 56 30 46 Q40 56 50 46 Q60 56 70 46 Q80 56 90 46 Q100 56 110 46 L118 46 L118 52 L10 52 Z" fill="#c0392b" stroke="#2a1f0e" stroke-width="1"/>
    <!-- Sign hanging -->
    <rect x="44" y="10" width="40" height="14" fill="#c8a86a" stroke="#2a1f0e" stroke-width="1.5" rx="2"/>
    <line x1="52" y1="10" x2="52" y2="14" stroke="#2a1f0e" stroke-width="1.5"/>
    <line x1="76" y1="10" x2="76" y2="14" stroke="#2a1f0e" stroke-width="1.5"/>
    <text x="64" y="21" font-family="serif" font-size="7" fill="#2a1f0e" text-anchor="middle" font-weight="bold">SHOP</text>
  </g>
</svg>
